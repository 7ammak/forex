server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /var/www/html/public;
    index index.html index.php;

    client_max_body_size 16M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Laravel API — everything under /api goes through Laravel's front controller.
    location ^~ /api/ {
        try_files $uri /index.php?$query_string;
    }

    # Laravel's built-in health endpoint (Laravel 11 ships /up by default).
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # Hashed Vite assets — immutable, cache for a year.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — any non-API path that isn't a static file serves index.html
    # so React Router can pick up the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny access to dotfiles (except .well-known) — protects .env etc.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
