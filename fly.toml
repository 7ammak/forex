# fly.toml app configuration file generated for forex on 2026-05-24T19:21:18+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'forex'
primary_region = 'fra'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# Persistent SQLite — survives deploys. Volume created via:
#   flyctl volumes create forex_data --region fra --size 1
# Mounted at /data (NOT /var/www/html/database — that would shadow the
# migrations/ and seeders/ directories that ship inside the image).
# DB_DATABASE secret points at /data/database.sqlite.
[[mounts]]
  source = "forex_data"
  destination = "/data"
